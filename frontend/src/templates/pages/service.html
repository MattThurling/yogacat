{% extends "base.html" %}

{% block content %}
<main>
  <header class="bg-base-200/60">
    <div class="mx-auto max-w-6xl px-6 py-16 md:py-24">
      <p class="text-sm uppercase tracking-[0.35em] text-base-content/50">Service</p>
      <h1 class="mt-4 max-w-6xl text-4xl font-bold md:text-6xl">{{ page.display_h1 }}</h1>
      {% if page.intro %}
        <p class="mt-5 max-w-6xl text-lg leading-8 text-base-content/70">{{ page.intro|linebreaksbr }}</p>
      {% endif %}
    </div>
  </header>
  {% include "pages/_sections.html" %}
</main>
{% endblock %}
