<section class="mx-auto max-w-6xl py-12">
  {% if section.eyebrow %}
    <p class="text-sm uppercase tracking-[0.35em] text-base-content/50">{{ section.eyebrow }}</p>
  {% endif %}
  {% if section.heading %}
    <h2 class="mt-3 text-3xl font-bold md:text-4xl">{{ section.heading }}</h2>
  {% endif %}
  {% if section.intro %}
    <p class="mt-4 text-lg leading-8 text-base-content/70">{{ section.intro|linebreaksbr }}</p>
  {% endif %}
  {% if section.body %}
    <div class="mt-6 space-y-5 leading-8 text-base-content/80">{{ section.body|linebreaks }}</div>
  {% endif %}
</section>
